name: Deployment with Manual Approval

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build application
        run: |
          echo "Building application..."
          echo "Build artifact: app-${{ github.sha }}"

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    # TODO: Add environment 'staging' (no protection rules — auto deploy)
    steps:
      - name: Deploy to staging
        run: echo "Deployed to staging"

  test-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Run smoke tests on staging
        run: |
          echo "Running smoke tests..."
          echo "All tests passed"

  approve-production:
    needs: test-staging
    runs-on: ubuntu-latest
    environment: production-approval
    steps:
      - name: Run on prodcution-approval
      run: |
       echo "Running production approval..."
  # TODO: Add an 'approve-production' job
  # - needs: test-staging
  # - environment: production-approval (with required reviewer + wait timer)
  # - steps: echo a confirmation

  deploy-production:
    # TODO: Change needs to approve-production
    needs: approve-production
    runs-on: ubuntu-latest
    environment: production
    # TODO: Add environment 'production' with URL
    steps:
      - name: Deploy to production
        run: echo "Deployed to production"

  post-deploy:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Verify production
        run: echo "Production smoke tests passed"
